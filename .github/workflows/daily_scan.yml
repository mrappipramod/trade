name: Daily Stock Screener

on:
  schedule:
    # 6:00 AM IST = 00:30 UTC, Mon–Fri (NSE opens 9:15 AM; run pre-market)
    - cron: "30 0 * * 1-5"
    # Also run at 3:45 PM IST = 10:15 UTC (post-market close scan)
    - cron: "15 10 * * 1-5"
  workflow_dispatch:    # run manually from GitHub Actions tab
    inputs:
      cap:
        description: "Cap segment"
        required: false
        default: "all"
        type: choice
        options: [all, largecap, midcap, smallcap]
      trade:
        description: "Trade type filter"
        required: false
        default: "all"
        type: choice
        options: [all, longterm, swing, intraday]
      min_score:
        description: "Minimum composite score (0-100)"
        required: false
        default: "55"

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run screener
        env:
          TELEGRAM_TOKEN:      ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          EMAIL_SENDER:        ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:      ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT:     ${{ secrets.EMAIL_RECIPIENT }}
          TWILIO_ACCOUNT_SID:  ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN:   ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_WHATSAPP_FROM:${{ secrets.TWILIO_WHATSAPP_FROM }}
          TWILIO_WHATSAPP_TO:  ${{ secrets.TWILIO_WHATSAPP_TO }}
        run: |
          python main.py \
            --cap   ${{ github.event.inputs.cap       || 'all' }} \
            --trade ${{ github.event.inputs.trade     || 'all' }} \
            --min-score ${{ github.event.inputs.min_score || '55' }} \
            --max 150 \
            --workers 5
