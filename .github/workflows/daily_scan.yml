name: Daily Stock Screener

on:
  schedule:
    - cron: "30 0 * * 1-5"   # 6:00 AM IST (pre-market)
    - cron: "15 10 * * 1-5"  # 3:45 PM IST (post-market close)
  workflow_dispatch:
    inputs:
      cap:
        description: "Cap segment (all / largecap / midcap / smallcap)"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - largecap
          - midcap
          - smallcap
      trade:
        description: "Trade type filter (all / longterm / swing / intraday)"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - longterm
          - swing
          - intraday
      min_score:
        description: "Minimum composite score (0-100)"
        required: false
        default: "55"
        type: string

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run screener
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_WHATSAPP_FROM: ${{ secrets.TWILIO_WHATSAPP_FROM }}
          TWILIO_WHATSAPP_TO: ${{ secrets.TWILIO_WHATSAPP_TO }}
          SCREENER_CAP: ${{ inputs.cap || 'all' }}
          SCREENER_TRADE: ${{ inputs.trade || 'all' }}
          SCREENER_MIN_SCORE: ${{ inputs.min_score || '55' }}
        run: |
          python main.py \
            --cap "$SCREENER_CAP" \
            --trade "$SCREENER_TRADE" \
            --min-score "$SCREENER_MIN_SCORE" \
            --max 150 \
            --workers 5
